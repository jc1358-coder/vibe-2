<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>몽글몽글 저금통 - 나만의 파스텔 가계부</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pastel: {
                            pink: '#FFE5EC',
                            pinkDark: '#FFC2D1',
                            peach: '#F9DEC9',
                            yellow: '#FEF9E7',
                            green: '#E8F5E9',
                            blue: '#E3F2FD',
                            purple: '#F3E5F5',
                            mint: '#E0F2F1',
                            text: '#4A4A4A'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome (for piggy bank, wallet emojis and cute design) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (xlsx) for exporting to excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Google Fonts - Cute Soft Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #FAF6F0;
            color: #4A4A4A;
        }
        .cute-title {
            font-family: 'Gamja Flower', cursive;
        }
        /* Custom scrollbar for pastel theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF6F0;
        }
        ::-webkit-scrollbar-thumb {
            background: #FFC2D1;
            border-radius: 9999px;
        }
        /* Bounce & Hover animations */
        .hover-bounce:hover {
            transform: translateY(-2px);
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header Section (Piggy Bank / Wallet Theme) -->
    <header class="bg-gradient-to-r from-pastel-pink to-pastel-peach shadow-md py-6 px-4 mb-8 rounded-b-[2.5rem] border-b-4 border-pastel-pinkDark">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <!-- Cute Piggy Bank & Wallet Icon Deco -->
                <div class="relative bg-white p-3 rounded-full shadow-inner border-2 border-dashed border-pastel-pinkDark animate-bounce" style="animation-duration: 3s;">
                    <i class="fa-solid fa-piggy-bank text-4xl text-pink-400"></i>
                    <span class="absolute -bottom-1 -right-1 text-xl">🪙</span>
                </div>
                <div>
                    <h1 class="cute-title text-4xl font-bold text-pastel-text tracking-wide flex items-center gap-2">
                        몽글 저금통 <span class="text-2xl text-yellow-500">💰</span>
                    </h1>
                    <p class="text-sm text-gray-600 mt-1">소중한 내 지갑을 지키는 말랑말랑 파스텔 가계부</p>
                </div>
            </div>
            
            <!-- Quick Total Balance Card -->
            <div class="flex gap-4 w-full md:w-auto">
                <div class="bg-white/80 backdrop-blur-sm p-4 rounded-2xl flex-1 md:w-48 shadow-sm border border-pastel-pinkDark/40 flex items-center gap-3">
                    <div class="p-2 bg-pastel-blue rounded-xl text-blue-500"><i class="fa-solid fa-wallet text-xl"></i></div>
                    <div>
                        <p class="text-xs text-gray-500">지갑 총 잔액</p>
                        <p id="total-balance" class="font-bold text-base text-gray-700">0원</p>
                    </div>
                </div>
                <div class="bg-white/80 backdrop-blur-sm p-4 rounded-2xl flex-1 md:w-48 shadow-sm border border-pastel-pinkDark/40 flex items-center gap-3">
                    <div class="p-2 bg-pastel-green rounded-xl text-emerald-500"><i class="fa-solid fa-coins text-xl"></i></div>
                    <div>
                        <p class="text-xs text-gray-500">이번달 저축액</p>
                        <p id="monthly-saving" class="font-bold text-base text-emerald-600">0원</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left Column: Add Entry & Category Graph (5 cols) -->
        <div class="lg:col-span-5 space-y-8">
            
            <!-- 1. Add Transaction Form -->
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pastel-pink/60 relative overflow-hidden">
                <!-- Deco background lines -->
                <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-pastel-pink to-pastel-peach"></div>
                
                <h2 class="cute-title text-2xl font-bold mb-4 text-pastel-text flex items-center gap-2">
                    <i class="fa-solid fa-pen-fancy text-pink-400"></i> 새 내역 적기
                </h2>
                
                <form id="ledger-form" class="space-y-4">
                    <!-- Date Input -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">날짜 선택</label>
                        <input type="date" id="input-date" required
                               class="w-full px-3 py-2 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm bg-pastel-yellow/20">
                    </div>

                    <!-- Type Selector (Income vs Expense) -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-2">구분</label>
                        <div class="grid grid-cols-2 gap-3">
                            <button type="button" id="btn-income" onclick="setType('income')"
                                    class="py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-pastel-green/40 border-pastel-green text-green-700">
                                <i class="fa-solid fa-arrow-trend-up"></i> 입금 (수입)
                            </button>
                            <button type="button" id="btn-expense" onclick="setType('expense')"
                                    class="py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-white border-gray-200 text-gray-500">
                                <i class="fa-solid fa-arrow-trend-down"></i> 出금 (지출)
                            </button>
                        </div>
                    </div>

                    <!-- Category Selector (Dynamic based on Type) -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">카테고리</label>
                        <select id="input-category" required
                                class="w-full px-3 py-2 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm bg-white">
                            <!-- Populated by JavaScript -->
                        </select>
                    </div>

                    <!-- Amount -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">금액 (원)</label>
                        <div class="relative">
                            <input type="number" id="input-amount" min="1" placeholder="금액을 입력하세요" required
                                   class="w-full pl-3 pr-8 py-2.5 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm">
                            <span class="absolute right-3 top-2.5 text-gray-400 text-sm font-bold">원</span>
                        </div>
                    </div>

                    <!-- Description/Memo -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">메모 (선택)</label>
                        <input type="text" id="input-memo" placeholder="어디에 쓰셨나요?"
                               class="w-full px-3 py-2.5 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm">
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-pastel-pinkDark to-pink-300 hover:from-pink-300 hover:to-pastel-pinkDark text-gray-700 font-bold py-3 px-4 rounded-xl shadow-sm hover-bounce transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-piggy-bank"></i> 저금통에 쏙 넣기
                    </button>
                </form>
            </section>

            <!-- 2. Category Pie Chart -->
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pastel-pink/60">
                <h2 class="cute-title text-2xl font-bold mb-4 text-pastel-text flex items-center gap-2">
                    <i class="fa-solid fa-chart-pie text-pink-400"></i> 이번달 지출 리포트
                </h2>
                <div class="relative w-full aspect-square max-w-[280px] mx-auto flex items-center justify-center">
                    <!-- Chart fallback/No-data state -->
                    <div id="chart-no-data" class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 bg-gray-50/50 rounded-2xl border-2 border-dashed border-gray-200">
                        <span class="text-4xl mb-2">📊</span>
                        <p class="text-xs text-gray-500">이번 달 지출 내역이<br>아직 없어요!</p>
                    </div>
                    <canvas id="expenseChart" class="hidden"></canvas>
                </div>
            </section>
        </div>

        <!-- Right Column: Calendar & Transaction List (7 cols) -->
        <div class="lg:col-span-7 space-y-8">
            
            <!-- 3. Calendar View -->
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pastel-pink/60">
                <!-- Month Navigator -->
                <div class="flex items-center justify-between mb-6">
                    <button onclick="changeMonth(-1)" class="p-2 text-pastel-text hover:bg-pastel-pink/40 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-left text-lg"></i>
                    </button>
                    <h2 id="calendar-month-year" class="cute-title text-3xl font-bold text-pastel-text">
                        2026년 06월
                    </h2>
                    <button onclick="changeMonth(1)" class="p-2 text-pastel-text hover:bg-pastel-pink/40 rounded-full transition-all">
                        <i class="fa-solid fa-chevron-right text-lg"></i>
                    </button>
                </div>

                <!-- Days of Week Header -->
                <div class="grid grid-cols-7 gap-1 text-center text-xs font-bold text-gray-400 mb-2">
                    <div class="text-red-400">일</div>
                    <div>월</div>
                    <div>화</div>
                    <div>수</div>
                    <div>목</div>
                    <div>금</div>
                    <div class="text-blue-400">토</div>
                </div>

                <!-- Calendar Days Grid -->
                <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                    <!-- Dynamically rendered -->
                </div>
            </section>

            <!-- 4. Detailed Transaction History & Actions -->
            <section class="bg-white rounded-3xl p-6 shadow-sm border border-pastel-pink/60">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-4">
                    <h2 class="cute-title text-2xl font-bold text-pastel-text flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-pink-400"></i> 내역 리스트
                    </h2>
                    
                    <!-- Action Buttons -->
                    <div class="flex gap-2 w-full sm:w-auto">
                        <!-- Excel Export Button -->
                        <button onclick="exportToExcel()" 
                                class="flex-1 sm:flex-none bg-pastel-green hover:bg-emerald-200 text-emerald-800 font-bold px-3.5 py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 hover-bounce shadow-sm">
                            <i class="fa-solid fa-file-excel text-sm text-emerald-600"></i> 엑셀로 내보내기
                        </button>
                        <!-- Clear Data Button -->
                        <button onclick="resetLedger()" 
                                class="bg-pastel-pink hover:bg-red-100 text-red-600 font-bold px-3.5 py-2 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 hover-bounce shadow-sm">
                            <i class="fa-solid fa-trash-can"></i> 전체 비우기
                        </button>
                    </div>
                </div>

                <!-- Filter Controls -->
                <div class="flex gap-2 mb-4 bg-gray-50 p-2 rounded-xl border border-gray-100">
                    <button onclick="setFilter('all')" id="filter-all" class="flex-1 py-1 px-3 text-xs font-bold rounded-lg transition-all bg-white text-pastel-text shadow-sm border border-pastel-pink/30">전체보기</button>
                    <button onclick="setFilter('income')" id="filter-income" class="flex-1 py-1 px-3 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-pastel-text">입금만</button>
                    <button onclick="setFilter('expense')" id="filter-expense" class="flex-1 py-1 px-3 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-pastel-text">출금만</button>
                </div>

                <!-- Items Container with scroll -->
                <div class="overflow-y-auto max-h-[300px] pr-2 space-y-2.5" id="history-container">
                    <!-- Dynamically populated -->
                </div>
            </section>

        </div>
    </main>

    <!-- Cute Pastel Edit Modal (Pop-up) -->
    <div id="edit-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-all">
        <div class="bg-white rounded-3xl p-6 w-full max-w-md shadow-2xl border-2 border-pastel-pinkDark relative animate-in fade-in zoom-in-95 duration-200">
            <!-- Deco line -->
            <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-pastel-pink to-pastel-peach rounded-t-3xl"></div>
            
            <div class="flex items-center justify-between mb-4 mt-1">
                <h3 class="cute-title text-2xl font-bold text-pastel-text flex items-center gap-2">
                    <i class="fa-solid fa-pen-to-square text-pink-400"></i> 내역 수정하기 ✏️
                </h3>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 transition-colors p-1">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <form id="edit-form" class="space-y-4">
                <!-- Date Input -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">날짜</label>
                    <input type="date" id="edit-date" required
                           class="w-full px-3 py-2 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm bg-pastel-yellow/10">
                </div>

                <!-- Type Selector (Income vs Expense) -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-2">구분</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="edit-btn-income" onclick="setEditType('income')"
                                class="py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-arrow-trend-up"></i> 입금 (수입)
                        </button>
                        <button type="button" id="edit-btn-expense" onclick="setEditType('expense')"
                                class="py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5">
                            <i class="fa-solid fa-arrow-trend-down"></i> 출금 (지출)
                        </button>
                    </div>
                </div>

                <!-- Category Selector -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">카테고리</label>
                    <select id="edit-category" required
                            class="w-full px-3 py-2 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm bg-white">
                        <!-- Populated by JavaScript -->
                    </select>
                </div>

                <!-- Amount -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">금액 (원)</label>
                    <div class="relative">
                        <input type="number" id="edit-amount" min="1" placeholder="금액을 입력하세요" required
                               class="w-full pl-3 pr-8 py-2.5 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm">
                        <span class="absolute right-3 top-2.5 text-gray-400 text-sm font-bold">원</span>
                    </div>
                </div>

                <!-- Description/Memo -->
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">메모 (선택)</label>
                    <input type="text" id="edit-memo" placeholder="어디에 쓰셨나요?"
                           class="w-full px-3 py-2.5 border-2 border-pastel-pink/40 rounded-xl focus:border-pastel-pinkDark focus:ring-0 text-sm">
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button type="button" onclick="closeEditModal()"
                            class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2.5 px-4 rounded-xl text-sm transition-all text-center">
                        취소
                    </button>
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-pastel-pinkDark to-pink-300 hover:from-pink-300 hover:to-pastel-pinkDark text-gray-700 font-bold py-2.5 px-4 rounded-xl text-sm shadow-sm hover-bounce transition-all text-center">
                        수정 완료 ✨
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Modal/Toast notifications instead of browser alert -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-xl transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none flex items-center gap-3 z-50">
        <span id="toast-icon">✨</span>
        <span id="toast-message" class="text-sm font-semibold">저금 완료!</span>
    </div>

    <script>
        // --- CONSTANTS & CONFIGURATION ---
        const APP_ID = 'pastel-ledger-v1';
        
        // Define Categories and colors for display
        const CATEGORIES = {
            income: {
                '월급': { color: '#E8F5E9', textColor: '#2E7D32', icon: 'fa-briefcase' },
                '기타': { color: '#E3F2FD', textColor: '#1565C0', icon: 'fa-gift' }
            },
            expense: {
                '식비': { color: '#FFE5EC', textColor: '#C2185B', icon: 'fa-utensils' },
                '통신비': { color: '#F3E5F5', textColor: '#7B1FA2', icon: 'fa-mobile-screen-button' },
                '교통비': { color: '#E0F2F1', textColor: '#00796B', icon: 'fa-bus' },
                '기타': { color: '#F9DEC9', textColor: '#8D6E63', icon: 'fa-tag' }
            }
        };

        const CATEGORY_COLORS = {
            '식비': '#FFC2D1',
            '통신비': '#D1C4E9',
            '교통비': '#B2DFDB',
            '기타': '#FFE0B2',
        };

        // --- APPLICATION STATE ---
        let ledgerData = [];
        let currentType = 'income'; // 'income' or 'expense'
        let currentYear = 2026;
        let currentMonth = 5; // June (0-indexed: 0 = Jan, 5 = Jun)
        let currentFilter = 'all'; // 'all', 'income', 'expense'
        let myChart = null;
        let editingId = null; // ID of the transaction currently being edited
        let currentEditType = 'income';

        // --- LIFE CYCLE / ON LOAD ---
        window.addEventListener('DOMContentLoaded', () => {
            // Set current date to input field as default
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            
            const localDate = today.toLocaleDateString('sv'); // 'YYYY-MM-DD'
            document.getElementById('input-date').value = localDate;

            // Load data from memory/initial dummy if empty
            loadData();
            
            // Set default type
            setType('income');
            
            // Render View
            renderAll();
        });

        // --- DATA PERSISTENCE ---
        function loadData() {
            const saved = localStorage.getItem(APP_ID);
            if (saved) {
                try {
                    ledgerData = JSON.parse(saved);
                } catch (e) {
                    ledgerData = getDummyData();
                }
            } else {
                // Pre-populate with cute dummy data for premium demonstration
                ledgerData = getDummyData();
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem(APP_ID, JSON.stringify(ledgerData));
        }

        function getDummyData() {
            return [
                { id: '1', date: '2026-06-05', type: 'income', category: '월급', amount: 2500000, memo: '보너스 포함!' },
                { id: '2', date: '2026-06-05', type: 'expense', category: '식비', amount: 12500, memo: '맛있는 덮밥' },
                { id: '3', date: '2026-06-12', type: 'expense', category: '교통비', amount: 45000, memo: '교통카드 충전' },
                { id: '4', date: '2026-06-15', type: 'expense', category: '식비', amount: 35000, memo: '친구랑 카페 디저트' },
                { id: '5', date: '2026-06-20', type: 'expense', category: '통신비', amount: 55000, memo: '통신 요금 납부' },
                { id: '6', date: '2026-06-25', type: 'income', category: '기타', amount: 15000, memo: '중고나라 거래' },
                { id: '7', date: '2026-06-28', type: 'expense', category: '기타', amount: 20000, memo: '지갑 수선비' }
            ];
        }

        // --- ACTIONS & HANDLERS ---
        function setType(type) {
            currentType = type;
            const btnIncome = document.getElementById('btn-income');
            const btnExpense = document.getElementById('btn-expense');
            const categorySelect = document.getElementById('input-category');

            if (type === 'income') {
                btnIncome.className = 'py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-pastel-green/40 border-pastel-green text-green-700';
                btnExpense.className = 'py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-white border-gray-200 text-gray-500';
            } else {
                btnIncome.className = 'py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-white border-gray-200 text-gray-500';
                btnExpense.className = 'py-2.5 rounded-xl border-2 font-bold text-sm transition-all flex items-center justify-center gap-2 bg-pastel-pink/50 border-pastel-pinkDark text-red-700';
            }

            // Populate corresponding categories
            categorySelect.innerHTML = '';
            const list = CATEGORIES[type];
            Object.keys(list).forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                categorySelect.appendChild(opt);
            });
        }

        // Handle Add Entry Form Submission
        document.getElementById('ledger-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const dateVal = document.getElementById('input-date').value;
            const catVal = document.getElementById('input-category').value;
            const amountVal = parseInt(document.getElementById('input-amount').value, 10);
            const memoVal = document.getElementById('input-memo').value.trim();

            if (!dateVal || !catVal || isNaN(amountVal) || amountVal <= 0) {
                showToast('❌ 올바른 값을 적어주세요.', 'error');
                return;
            }

            // Create new entry
            const newEntry = {
                id: Date.now().toString(),
                date: dateVal,
                type: currentType,
                category: catVal,
                amount: amountVal,
                memo: memoVal
            };

            ledgerData.push(newEntry);
            saveData();
            
            // Sync calendar current month/year to the added entry's date for pleasant UX
            const entryDate = new Date(dateVal);
            currentYear = entryDate.getFullYear();
            currentMonth = entryDate.getMonth();

            // Clear Form
            document.getElementById('input-amount').value = '';
            document.getElementById('input-memo').value = '';

            renderAll();
            showToast('💰 저금통에 안전하게 쏙 넣었어요!', 'success');
        });

        // Filter Transactions
        function setFilter(filterType) {
            currentFilter = filterType;
            const btns = ['all', 'income', 'expense'];
            btns.forEach(b => {
                const el = document.getElementById(`filter-${b}`);
                if (b === filterType) {
                    el.className = 'flex-1 py-1 px-3 text-xs font-bold rounded-lg transition-all bg-white text-pastel-text shadow-sm border border-pastel-pink/30';
                } else {
                    el.className = 'flex-1 py-1 px-3 text-xs font-bold rounded-lg transition-all text-gray-500 hover:text-pastel-text';
                }
            });
            renderHistoryList();
        }

        // Change calendar Month
        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderAll();
        }

        // Delete entry
        function deleteEntry(id) {
            ledgerData = ledgerData.filter(item => item.id !== id);
            saveData();
            renderAll();
            showToast('🗑️ 내역을 깨끗하게 지웠어요.', 'success');
        }

        // Reset all ledger data
        function resetLedger() {
            if (confirm('모든 가계부 내역이 삭제됩니다. 정말 저금통을 리셋할까요?')) {
                ledgerData = [];
                saveData();
                renderAll();
                showToast('🧹 저금통을 완전히 비웠어요.', 'success');
            }
        }

        // --- EDIT MODAL LOGIC ---
        function openEditModal(id) {
            const item = ledgerData.find(i => i.id === id);
            if (!item) return;

            editingId = id;
            
            // Populate basic fields
            document.getElementById('edit-date').value = item.date;
            document.getElementById('edit-amount').value = item.amount;
            document.getElementById('edit-memo').value = item.memo || '';
            
            // Set transaction type visual and options list
            setEditType(item.type);
            
            // Choose the active category option
            document.getElementById('edit-category').value = item.category;

            // Trigger modal animation/visibility
            const modal = document.getElementById('edit-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeEditModal() {
            editingId = null;
            const modal = document.getElementById('edit-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function setEditType(type) {
            currentEditType = type;
            const btnIncome = document.getElementById('edit-btn-income');
            const btnExpense = document.getElementById('edit-btn-expense');
            const categorySelect = document.getElementById('edit-category');

            if (type === 'income') {
                btnIncome.className = 'py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5 bg-pastel-green/40 border-pastel-green text-green-700';
                btnExpense.className = 'py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5 bg-white border-gray-200 text-gray-500';
            } else {
                btnIncome.className = 'py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5 bg-white border-gray-200 text-gray-500';
                btnExpense.className = 'py-2 rounded-xl border-2 font-bold text-xs transition-all flex items-center justify-center gap-1.5 bg-pastel-pink/50 border-pastel-pinkDark text-red-700';
            }

            // Populate categories for edit selector
            categorySelect.innerHTML = '';
            const list = CATEGORIES[type];
            Object.keys(list).forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                categorySelect.appendChild(opt);
            });
        }

        // Handle Edit Form Submission
        document.getElementById('edit-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (!editingId) return;

            const dateVal = document.getElementById('edit-date').value;
            const catVal = document.getElementById('edit-category').value;
            const amountVal = parseInt(document.getElementById('edit-amount').value, 10);
            const memoVal = document.getElementById('edit-memo').value.trim();

            if (!dateVal || !catVal || isNaN(amountVal) || amountVal <= 0) {
                showToast('❌ 올바른 값을 적어주세요.', 'error');
                return;
            }

            // Find and modify active item inside state array
            const itemIndex = ledgerData.findIndex(item => item.id === editingId);
            if (itemIndex !== -1) {
                ledgerData[itemIndex].date = dateVal;
                ledgerData[itemIndex].type = currentEditType;
                ledgerData[itemIndex].category = catVal;
                ledgerData[itemIndex].amount = amountVal;
                ledgerData[itemIndex].memo = memoVal;

                saveData();
                renderAll();
                closeEditModal();
                showToast('✏️ 가계부 내역이 깔끔하게 수정되었습니다!', 'success');
            }
        });

        // --- RENDER FUNCTIONS ---
        function renderAll() {
            renderHeaderStats();
            renderCalendar();
            renderHistoryList();
            renderChart();
        }

        // Calculate and Render top Stats (Balance / Saving)
        function renderHeaderStats() {
            let totalBalance = 0;
            let monthlySaving = 0; // Cumulative Saving (Income - Expense) for active calendar month
            
            ledgerData.forEach(item => {
                const amt = item.amount;
                if (item.type === 'income') {
                    totalBalance += amt;
                } else {
                    totalBalance -= amt;
                }

                // Check if entry belongs to active calendar month
                const itemDate = new Date(item.date);
                if (itemDate.getFullYear() === currentYear && itemDate.getMonth() === currentMonth) {
                    if (item.type === 'income') {
                        monthlySaving += amt;
                    } else {
                        monthlySaving -= amt;
                    }
                }
            });

            document.getElementById('total-balance').textContent = totalBalance.toLocaleString() + '원';
            
            const savingEl = document.getElementById('monthly-saving');
            savingEl.textContent = monthlySaving.toLocaleString() + '원';
            if (monthlySaving >= 0) {
                savingEl.className = 'font-bold text-base text-emerald-600';
            } else {
                savingEl.className = 'font-bold text-base text-red-500';
            }
        }

        // Render Calendar Grid
        function renderCalendar() {
            const calendarGrid = document.getElementById('calendar-grid');
            const monthYearEl = document.getElementById('calendar-month-year');
            
            // Update Title
            monthYearEl.textContent = `${currentYear}년 ${(currentMonth + 1).toString().padStart(2, '0')}월`;

            calendarGrid.innerHTML = '';

            // Calculate starting parameters for calendar month
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevMonthTotalDays = new Date(currentYear, currentMonth, 0).getDate();

            // Store entries mapping for the active month for super quick access
            const dailyData = {};
            ledgerData.forEach(item => {
                const itemDate = new Date(item.date);
                if (itemDate.getFullYear() === currentYear && itemDate.getMonth() === currentMonth) {
                    const d = itemDate.getDate();
                    if (!dailyData[d]) dailyData[d] = { income: 0, expense: 0 };
                    if (item.type === 'income') {
                        dailyData[d].income += item.amount;
                    } else {
                        dailyData[d].expense += item.amount;
                    }
                }
            });

            // 1. Previous Month Days (Gray/Translucent)
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                const dayVal = prevMonthTotalDays - i;
                const blankCell = document.createElement('div');
                blankCell.className = 'min-h-[75px] p-1 bg-gray-50/40 border border-gray-100 rounded-xl text-xs text-gray-300 select-none';
                blankCell.innerHTML = `<span class="opacity-40 font-bold">${dayVal}</span>`;
                calendarGrid.appendChild(blankCell);
            }

            // 2. Current Month Days
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                
                // Color formatting based on day of week
                const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                let dayColorClass = 'text-gray-700';
                if (dayOfWeek === 0) dayColorClass = 'text-red-500'; // Sunday
                if (dayOfWeek === 6) dayColorClass = 'text-blue-500'; // Saturday

                // Build daily financial summary badges
                const finances = dailyData[day];
                let summaryHtml = '';
                if (finances) {
                    if (finances.income > 0) {
                        summaryHtml += `<div class="mt-0.5 px-1 py-0.2 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded truncate text-center">+${(finances.income / 1000).toFixed(0)}k</div>`;
                    }
                    if (finances.expense > 0) {
                        summaryHtml += `<div class="mt-0.5 px-1 py-0.2 bg-pink-100 text-pink-700 text-[10px] font-bold rounded truncate text-center">-${(finances.expense / 1000).toFixed(0)}k</div>`;
                    }
                }

                // Make today highlighted
                const today = new Date();
                const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day;
                const todayClass = isToday ? 'bg-pastel-pink border-2 border-pastel-pinkDark' : 'bg-white border border-pastel-pink/20';

                dayCell.className = `min-h-[82px] p-1 ${todayClass} rounded-2xl flex flex-col justify-between hover:bg-pastel-yellow/30 transition-all cursor-pointer shadow-sm`;
                dayCell.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-xs ${dayColorClass}">${day}</span>
                        ${isToday ? '<span class="text-[10px] bg-pink-400 text-white px-1 rounded-full scale-90">Today</span>' : ''}
                    </div>
                    <div class="flex-1 flex flex-col justify-end">
                        ${summaryHtml}
                    </div>
                `;

                // Add quick click listener to set date input to this clicked day
                dayCell.addEventListener('click', () => {
                    const formattedDate = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                    document.getElementById('input-date').value = formattedDate;
                    showToast(`📅 날짜를 ${day}일로 바꿨어요!`, 'success');
                });

                calendarGrid.appendChild(dayCell);
            }

            // 3. Next Month Days filling the remainder of the calendar row (standard grid is 42 or 35 cells)
            const totalCellsRendered = firstDayIndex + totalDays;
            const remainingBlankCells = (totalCellsRendered % 7 === 0) ? 0 : 7 - (totalCellsRendered % 7);
            
            for (let dayVal = 1; dayVal <= remainingBlankCells; dayVal++) {
                const blankCell = document.createElement('div');
                blankCell.className = 'min-h-[75px] p-1 bg-gray-50/40 border border-gray-100 rounded-xl text-xs text-gray-300 select-none';
                blankCell.innerHTML = `<span class="opacity-40 font-bold">${dayVal}</span>`;
                calendarGrid.appendChild(blankCell);
            }
        }

        // Render Transaction List under matching Filters
        function renderHistoryList() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            // Filter down matching items for active month & year
            const filtered = ledgerData.filter(item => {
                const itemDate = new Date(item.date);
                const isMatchingMonth = itemDate.getFullYear() === currentYear && itemDate.getMonth() === currentMonth;
                
                if (!isMatchingMonth) return false;
                if (currentFilter === 'all') return true;
                return item.type === currentFilter;
            }).sort((a, b) => new Date(b.date) - new Date(a.date)); // Sort latest first

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-400">
                        <div class="text-3xl mb-1">🐾</div>
                        <p class="text-sm">기록된 내역이 없어요.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                const isIncome = item.type === 'income';
                const theme = CATEGORIES[item.type][item.category] || { color: '#E0E0E0', textColor: '#424242', icon: 'fa-question' };
                
                const itemEl = document.createElement('div');
                itemEl.className = `flex items-center justify-between p-3.5 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all group`;
                
                itemEl.innerHTML = `
                    <div class="flex items-center gap-3">
                        <!-- Tiny visual tag category icon -->
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg" style="background-color: ${theme.color}; color: ${theme.textColor};">
                            <i class="fa-solid ${theme.icon}"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-sm text-gray-700">${item.category}</span>
                                <span class="text-[10px] text-gray-400 font-bold">${item.date.split('-')[2]}일</span>
                            </div>
                            <p class="text-xs text-gray-400 line-clamp-1">${item.memo || '남겨진 메모가 없어요'}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-sm ${isIncome ? 'text-emerald-500' : 'text-rose-400'} mr-1">
                            ${isIncome ? '+' : '-'}${item.amount.toLocaleString()}원
                        </span>
                        
                        <!-- Action group: Edit & Delete (always visible on mobile, hover on desktop) -->
                        <div class="flex items-center gap-1 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                            <!-- Custom Edit Button -->
                            <button onclick="openEditModal('${item.id}')" 
                                    title="수정하기"
                                    class="p-1.5 text-gray-400 hover:text-sky-500 rounded-lg hover:bg-sky-50 transition-colors">
                                <i class="fa-solid fa-pen text-xs"></i>
                            </button>
                            <!-- Custom Delete Button -->
                            <button onclick="deleteEntry('${item.id}')" 
                                    title="삭제하기"
                                    class="p-1.5 text-gray-400 hover:text-red-400 rounded-lg hover:bg-red-50 transition-colors">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(itemEl);
            });
        }

        // Render Graph based on monthly Expense Category breakdown
        function renderChart() {
            const chartCanvas = document.getElementById('expenseChart');
            const noDataEl = document.getElementById('chart-no-data');

            // Calculate category aggregation for active calendar month
            const expenseSums = {};
            let totalExpense = 0;

            ledgerData.forEach(item => {
                const itemDate = new Date(item.date);
                if (itemDate.getFullYear() === currentYear && itemDate.getMonth() === currentMonth) {
                    if (item.type === 'expense') {
                        expenseSums[item.category] = (expenseSums[item.category] || 0) + item.amount;
                        totalExpense += item.amount;
                    }
                }
            });

            // Toggle No-Data layout
            if (totalExpense === 0) {
                chartCanvas.classList.add('hidden');
                noDataEl.classList.remove('hidden');
                if (myChart) {
                    myChart.destroy();
                    myChart = null;
                }
                return;
            }

            chartCanvas.classList.remove('hidden');
            noDataEl.classList.add('hidden');

            const labels = Object.keys(expenseSums);
            const dataValues = Object.values(expenseSums);
            const backgroundColors = labels.map(label => CATEGORY_COLORS[label] || '#B0BEC5');

            // Destroy existing instance to prevent duplicates and tooltips flickering
            if (myChart) {
                myChart.destroy();
            }

            // Create new pristine styled Pastel Doughnut Chart
            myChart = new Chart(chartCanvas, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: backgroundColors,
                        borderWidth: 3,
                        borderColor: '#FFFFFF',
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                boxWidth: 12,
                                font: {
                                    size: 11,
                                    family: 'Nanum Gothic'
                                },
                                color: '#4A4A4A'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const value = context.raw || 0;
                                    const percent = ((value / totalExpense) * 100).toFixed(1);
                                    return ` ${context.label}: ${value.toLocaleString()}원 (${percent}%)`;
                                }
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
        }

        // --- EXPORT TO EXCEL ---
        function exportToExcel() {
            if (ledgerData.length === 0) {
                showToast('❌ 내보낼 내역이 비어 있습니다.', 'error');
                return;
            }

            // Build beautifully structured flat array representing the full table dataset
            const processedRows = ledgerData.map((item, idx) => ({
                '번호': idx + 1,
                '날짜': item.date,
                '유형': item.type === 'income' ? '입금(수입)' : '출금(지출)',
                '카테고리': item.category,
                '금액(원)': item.amount,
                '메모': item.memo || ''
            })).sort((a, b) => new Date(a['날짜']) - new Date(b['날짜']));

            // Use SheetJS to convert and trigger file save
            const worksheet = XLSX.utils.json_to_sheet(processedRows);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "가계부 총 내역");

            // Set column widths for optimal display in MS Excel
            const max_widths = [
                { wch: 6 },  // 번호
                { wch: 15 }, // 날짜
                { wch: 12 }, // 유형
                { wch: 12 }, // 카테고리
                { wch: 15 }, // 금액
                { wch: 30 }  // 메모
            ];
            worksheet['!cols'] = max_widths;

            // Generate file download automatically
            XLSX.writeFile(workbook, `몽글_가계부_내역_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast('📊 엑셀 파일 다운로드가 시작되었습니다!', 'success');
        }

        // --- CUSTOM TOAST NOTIFICATIONS ---
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.textContent = msg;
            toastIcon.textContent = type === 'success' ? '✨' : '⚠️';
            
            // Adjust visual style for errors if any
            if (type === 'error') {
                toast.className = "fixed bottom-6 right-6 bg-red-500 text-white px-6 py-3 rounded-2xl shadow-xl transition-all duration-300 transform translate-y-0 opacity-100 flex items-center gap-3 z-50";
            } else {
                toast.className = "fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl transition-all duration-300 transform translate-y-0 opacity-100 flex items-center gap-3 z-50";
            }

            // Set timeout to dismiss
            setTimeout(() => {
                toast.className = "fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-2xl shadow-xl transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none flex items-center gap-3 z-50";
            }, 3000);
        }
    </script>
</body>
</html>
